<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPARIO Print Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px;"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        AMPARIO Print Agent
    </h2>

    <div class="section">
        <div class="section-title">Server-Verbindung</div>
        <div class="form-row">
            <label>Server URL</label>
            <input type="text" id="serverUrl" placeholder="http://localhost:5050">
        </div>
        <div class="form-row">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="Agent API-Key aus Einstellungen">
        </div>
        <div class="form-row">
            <label></label>
            <button class="btn btn-secondary btn-sm" onclick="testConnection()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Verbindung testen
            </button>
            <span id="connectionStatus" class="status-text">
                <span class="status-dot unconfigured"></span>Nicht konfiguriert
            </span>
        </div>
    </div>

    <hr class="divider">

    <div class="section">
        <div class="section-title">Drucker</div>
        <div class="form-row">
            <label>Drucker</label>
            <select id="printerSelect">
                <option value="">Wird geladen...</option>
            </select>
            <button class="btn btn-secondary btn-sm" onclick="refreshPrinters()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
        </div>
    </div>

    <hr class="divider">

    <div class="section">
        <div class="section-title">Optionen</div>
        <div class="form-row">
            <label>Intervall</label>
            <input type="number" id="pollInterval" min="2" max="60" value="5" style="width:60px;flex:none;">
            <span class="status-text">Sekunden</span>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="autoStart" checked>
            <label style="width:auto;color:#f5f5f7;">Beim Anmelden automatisch starten</label>
        </div>
    </div>

    <div class="footer">
        <button class="btn btn-primary" onclick="saveAll()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Speichern
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
